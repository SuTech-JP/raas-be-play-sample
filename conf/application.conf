# =============================================================================
# RaaS 接続設定
# 環境変数 RAAS_APP, RAAS_LANDSCAPE, RAAS_TOKEN を設定するか、
# 直接ここに値を記入してください（本番環境では必ず環境変数を使用すること）
# =============================================================================

raas {
  application = "your-application-name"
  application = ${?RAAS_APP}

  landscape = "dev"
  landscape = ${?RAAS_LANDSCAPE}

  token = "your-system-token"
  token = ${?RAAS_TOKEN}
}

# =============================================================================
# サーバー設定
# =============================================================================

play.server.http.port = 8080
play.server.http.port = ${?PORT}

# =============================================================================
# CORS 設定
# フロントエンドの開発サーバーオリジンを許可する
# 本番環境では FRONTEND_ORIGIN 環境変数で上書きすること
# =============================================================================

play.filters.enabled += "play.filters.cors.CORSFilter"

play.filters.cors {
  # 許可するオリジン（null で全許可、配列で特定オリジンのみ許可）
  allowedOrigins = ["http://localhost:5173"]

  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]

  # null で全ヘッダー許可
  allowedHttpHeaders = null

  preflightMaxAge = 1 hour
}

# =============================================================================
# アプリケーション設定
# =============================================================================

play.http.secret.key = "changeme-use-long-random-string-in-production"
play.http.secret.key = ${?APPLICATION_SECRET}
